---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app authentik
  namespace: *app
spec:
  interval: 15m
  chart:
    spec:
      chart: authentik
      version: 2025.10.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: authentik-chart
  values:
    global:
      env:
        - name: AUTHENTIK_POSTGRESQL__HOST
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: AUTHENTIK_POSTGRESQL_HOST
        - name: AUTHENTIK_POSTGRESQL__NAME
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: AUTHENTIK_POSTGRESQL_NAME
        - name: AUTHENTIK_POSTGRESQL__USER
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: AUTHENTIK_POSTGRESQL_USER
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: AUTHENTIK_POSTGRESQL_PASSWORD
        - name: AUTHENTIK_POSTGRESQL__PORT
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: AUTHENTIK_POSTGRESQL_PORT
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: AUTHENTIK_SECRET_KEY
        - name: AUTHENTIK_REDIS__HOST
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: AUTHENTIK_POSTGRESQL_HOST
    server:
      name: server
      replicas: 1
      securityContext:
        runAsUser: &user 1000
        runAsGroup: *user
        fsGroup: *user

      ingress:
        enabled: false

      route:
        main:
          enabled: true
          kind: HTTPRoute
          hostnames: ["auth.mafyuh.io"]
          parentRefs:
            - name: envoy-external
              namespace: kube-system
              sectionName: http
            - name: envoy-external
              namespace: kube-system
              sectionName: https
          matches:
            - path:
                type: PathPrefix
                value: /
          httpsRedirect: false
          https: false

      metrics:
        serviceMonitor:
          enabled: true

      volumes:
        - name: custom-css
          configMap:
            name: authentik-custom-css
      volumeMounts:
        - name: custom-css
          mountPath: /web/dist/custom.css
          subPath: custom.css
      resources:
        requests:
          cpu: 200m
        limits:
          cpu: "1"
    worker:
      replicas: 1
      env:
      resources:
        requests:
          cpu: 20m
          memory: 600Mi
        limits:
          memory: 1024Mi
    authentik:
      log_level: info
      error_reporting:
        enabled: true
      email:
        from: noreply@mafyuh.io
        host: smtp.protonmail.ch
        port: 587
        username: noreply@mafyuh.io
        password: ${AUTHENTIK_SMTP_PASSWORD}
        use_ssl: false
        use_tls: true
        timeout: 30
      redis:
        host: "${AUTHENTIK_POSTGRESQL_HOST}" # redis was removed in 2025.10.0, waiting for values to be added
      embeddedOutpost:
        enabled: true
      secret_key: ${AUTHENTIK_SECRET_KEY}
    postgresql:
      enabled: false
    redis:
      enabled: false
